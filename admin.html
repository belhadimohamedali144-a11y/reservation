<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Arts House Maadid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#080706;color:#fff;padding:30px 5%}
h1{color:#d4a75f;font-family:Georgia,serif;margin-bottom:6px}
.sub{color:#cfc6b3;margin-bottom:25px}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tabs button{padding:10px 20px;background:#111;border:1px solid #5b4525;border-radius:8px;color:#fff;cursor:pointer;font-size:14px}
.tabs button.active{background:#c99a4d;color:#111;border-color:#c99a4d;font-weight:bold}
.stats{display:flex;gap:15px;margin-bottom:25px}
.stat{background:#111;border:1px solid rgba(201,154,77,.35);border-radius:10px;padding:15px 25px}
.stat b{color:#d4a75f;font-size:22px}
.stat p{color:#aaa;font-size:13px;margin-top:3px}
table{width:100%;border-collapse:collapse;background:#111;border-radius:12px;overflow:hidden}
th{background:#1a140e;color:#d4a75f;padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid #5b4525}
td{padding:11px 14px;border-bottom:1px solid #2a1f10;font-size:13px;color:#ddd}
tr:hover{background:#1a140e}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;background:rgba(212,167,95,.16);border:1px solid #d4a75f;color:#e8c887}
.empty{text-align:center;color:#666;padding:40px;font-style:italic}
.actions{display:flex;gap:6px}
.actions button{padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;border:1px solid}
.btn-del{background:#3a1a1a;border-color:#6a2a2a;color:#e66}
.btn-del:hover{background:#5a2a2a}
.btn-wa{background:#1a3a1a;border-color:#2a6a2a;color:#6e6}
.btn-wa:hover{background:#2a5a2a}
.stars{color:#c99a4d;font-size:16px;letter-spacing:2px}
.logout{float:right;background:transparent;border:1px solid #6a2a2a;color:#e66;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:Arial,sans-serif}
.logout:hover{background:#3a1a1a}
</style>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wt4lolosje");
</script>
</head>
<body>

<h1>Administration <button class="logout" onclick="logout()">Déconnexion</button></h1>
<p class="sub">Gestion des réservations — Arts House Maadid</p>

<div class="stats">
  <div class="stat"><b id="countN">0</b><p>Réservations</p></div>
  <div class="stat"><b id="countTotal">0</b><p>Total</p></div>
  <div class="stat"><b id="countFB">0</b><p>Avis clients</p></div>
</div>

<div id="msg" style="display:none;background:#1a2a1a;border:1px solid #2a6a2a;padding:12px 18px;border-radius:8px;color:#6e6;margin-bottom:15px;font-size:14px"></div>

<div style="display:flex;gap:20px;margin-bottom:16px;padding:12px 16px;background:#1a1a1a;border-radius:8px;border:1px solid #333;">
  <div><strong style="color:#c99a4d;">Réservations aujourd'hui</strong><br><span id="stat-total" style="font-size:24px;">-</span></div>
  <div style="color:#888;align-self:flex-end;margin-left:auto;"><span id="stat-date"></span></div>
</div>

<div class="tabs">
  <button class="active" onclick="switchTab('normales')">Réservations</button>
  <button onclick="switchTab('feedback')">Avis clients</button>
</div>

<div id="tabContent"></div>

<script>
const TOKEN = localStorage.getItem('token');
if (!TOKEN) { window.location.href = '/login'; }

function authHeaders() {
  return { 'Authorization': 'Bearer ' + TOKEN };
}

async function authFetch(url, opts = {}) {
  const r = await fetch(url, { ...opts, headers: { ...authHeaders(), ...opts.headers } });
  if (r.status === 401) { localStorage.removeItem('token'); window.location.href = '/login'; }
  return r;
}

function logout() {
  localStorage.removeItem('token');
  window.location.href = '/login';
}

let currentTab = 'normales';
let data = { normales: [] };
let feedback = [];

async function load() {
  const [r, f] = await Promise.all([
    authFetch('/api/reservations'),
    authFetch('/api/feedback')
  ]);
  data = (await r.json());
  feedback = (await f.json()).data || [];
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tabs button').forEach((b,i) => b.classList.toggle('active',
    (i===0 && tab==='normales') || (i===1 && tab==='feedback')));
  render();
}

function render() {
  document.getElementById('countN').textContent = data.normales.length;
  document.getElementById('countTotal').textContent = data.normales.length;
  document.getElementById('countFB').textContent = feedback.length;

  const container = document.getElementById('tabContent');

  if (currentTab === 'feedback') {
    if (!feedback.length) {
      container.innerHTML = '<div class="empty">Aucun avis client pour le moment.</div>';
      return;
    }
    container.innerHTML = `<table>
      <thead><tr>
        <th>ID</th><th>Nom</th><th>Note</th><th>Avis</th><th>Date</th><th></th>
      </tr></thead><tbody>
      ${feedback.map(e => `<tr>
        <td>${e.id}</td>
        <td>${esc(e.nom)}</td>
        <td><span class="stars">${'★'.repeat(e.note)}${'☆'.repeat(5-e.note)}</span></td>
        <td>${esc(e.message)}</td>
        <td>${new Date(e.created_at).toLocaleDateString('fr-FR')}</td>
        <td class="actions"><button class="btn-del" onclick="delFB(${e.id})" title="Supprimer">✕</button></td>
      </tr>`).join('')}
      </tbody></table>`;
    return;
  }

  const list = data.normales;
  if (!list.length) {
    container.innerHTML = '<div class="empty">Aucune réservation pour le moment.</div>';
    return;
  }
  container.innerHTML = `<table>
    <thead><tr>
      <th>ID</th><th>Nom</th><th>Téléphone</th><th>Email</th><th>Personnes</th><th>Date</th><th>Expérience</th><th>Message</th><th>Date de réservation</th><th></th>
    </tr></thead><tbody>
    ${list.map(e => `<tr>
      <td>${e.id}</td>
      <td><span data-clarity-mask="true">${esc(e.nom)}</span></td>
      <td><span data-clarity-mask="true">${esc(e.telephone)}</span></td>
      <td><span data-clarity-mask="true">${esc(e.email)}</span></td>
      <td>${esc(e.nombre_personnes)}</td>
      <td>${esc(e.date)}</td>
      <td><span class="badge">${esc(e.experience)}</span></td>
      <td>${esc(e.message||'-')}</td>
      <td>${new Date(e.created_at).toLocaleString('fr-FR')}</td>
      <td class="actions">
        <button class="btn-wa" onclick="cancelWA(${e.id})" title="Annuler + WhatsApp">📱</button>
        <button class="btn-del" onclick="remove(${e.id})" title="Supprimer">✕</button>
      </td>
    </tr>`).join('')}
    </tbody></table>`;
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function cancelWA(id) {
  if (!confirm('Annuler cette réservation et notifier le client via WhatsApp ?')) return;
  const r = await authFetch('/api/reservation/' + id, { method: 'DELETE' });
  const json = await r.json();
  if (json.whatsapp) {
    window.open(json.whatsapp, '_blank');
    showMsg(`Réservation annulée. WhatsApp ouvert pour ${json.client}`);
  } else {
    showMsg('Réservation supprimée (pas de téléphone client).');
  }
  load();
}

async function remove(id) {
  if (!confirm('Supprimer cette réservation sans notification ?')) return;
  await authFetch('/api/reservation/' + id, { method: 'DELETE' });
  showMsg('Réservation supprimée.');
  load();
}

async function delFB(id) {
  if (!confirm('Supprimer cet avis client ?')) return;
  await authFetch('/api/feedback/' + id, { method: 'DELETE' });
  showMsg('Avis supprimé.');
  load();
}

function showMsg(t) {
  const d = document.getElementById('msg');
  d.textContent = t;
  d.style.display = 'block';
  clearTimeout(d._t);
  d._t = setTimeout(() => d.style.display = 'none', 4000);
}

async function updateStats() {
  try {
    const response = await fetch('/api/stats', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    });
    const data = await response.json();
    if (data.success) {
      document.getElementById('stat-total').innerText = data.total;
      document.getElementById('stat-date').innerText = "Date : " + data.date;
    }
  } catch (err) {
    console.error("Erreur de récupération :", err);
  }
}

document.addEventListener('DOMContentLoaded', () => { updateStats(); load(); });
</script>
</body>
</html>
