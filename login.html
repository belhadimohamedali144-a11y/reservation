<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Admin — Arts House Maadid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#080706;color:#f0e6d0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:linear-gradient(160deg,#14100a,#0a0806);border:1px solid rgba(201,154,77,.3);border-radius:16px;padding:40px 36px;width:400px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.55)}
.card h1{text-align:center;color:#d4a75f;font-family:Georgia,serif;font-size:22px;margin-bottom:4px}
.card .sub{text-align:center;color:#9a8a70;font-size:13px;margin-bottom:28px}
.card label{display:block;color:#c9a55a;font-size:12px;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.card input{width:100%;padding:13px 14px;margin-bottom:16px;background:#0a0806;border:1px solid #3b2c18;border-radius:6px;color:#f0e6d0;font-size:14px;transition:border .3s}
.card input:focus{outline:none;border-color:#c99a4d;box-shadow:0 0 0 2px rgba(201,154,77,.12)}
.card button{width:100%;padding:14px;background:linear-gradient(135deg,#c99a4d,#b8862e);border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:15px;color:#111;transition:all .3s;letter-spacing:.5px;margin-top:4px}
.card button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,154,77,.22)}
.card button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.err{color:#e66;font-size:13px;text-align:center;margin-top:14px;display:none}
.spin{text-align:center;margin-top:14px;color:#9a8a70;font-size:13px;display:none}
</style>
</head>
<body>

<div class="card">
  <h1>Administration</h1>
  <p class="sub">Arts House Maadid</p>

  <form id="loginForm">
    <label for="email">Email</label>
    <input type="email" id="email" value="admin@artshousemaadid.com" required>

    <label for="password">Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" required>

    <button type="submit" id="btn">Se connecter</button>
  </form>

  <div class="err" id="err"></div>
  <div class="spin" id="spin">Connexion en cours…</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const spin = document.getElementById('spin');

  err.style.display = 'none';
  spin.style.display = 'block';
  btn.disabled = true;

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const json = await r.json();
    if (json.success) {
      localStorage.setItem('token', json.token);
      window.location.href = '/admin';
    } else {
      err.textContent = json.error || 'Erreur inconnue.';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Impossible de joindre le serveur.';
    err.style.display = 'block';
  } finally {
    spin.style.display = 'none';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
